name: shake_context
description: "Dual-mode, privacy-first, shake-triggered bug reporting and user feedback engine for Flutter."
version: 0.2.0
homepage: https://github.com/sakarchaulagain/shake_context
repository: https://github.com/sakarchaulagain/shake_context
issue_tracker: https://github.com/sakarchaulagain/shake_context/issues

topics:
  - bug-reporting
  - feedback
  - debugging
  - logging
  - shake

environment:
  sdk: ^3.11.5
  flutter: ">=1.17.0"

dependencies:
  flutter:
    sdk: flutter
  sensors_plus: ^6.0.0
  device_info_plus: ^11.0.0
  image_picker: ^1.0.0
  # App version / build number / package name surfaced under
  # `metadata.deviceInfo` so every report carries the version that produced
  # it — the single most-asked field on a bug ticket.
  package_info_plus: ^8.0.0
  # Crash-recovery persistence . Only touched when the host opts in
  # via `ShakeContext.guard(persistLogs: true)`.
  path_provider: ^2.1.0
  # Used only by `package:shake_context/dio.dart` (ShakeDioInterceptor).
  # If you don't import that file, dio is tree-shaken from your release build.
  dio: ^5.0.0
  # Used only by `package:shake_context/http.dart` (ShakeHttpClient).
  # Tree-shaken if you don't import that file.
  http: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # To add assets to your package, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg
  #
  # For details regarding assets in packages, see
  # https://flutter.dev/to/asset-from-package
  #
  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # To add custom fonts to your package, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
